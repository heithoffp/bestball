name: iOS Build (local, macOS runner)

# Free iOS builds for a PUBLIC repo (TASK-334). Public repos get unlimited
# Actions minutes on standard runners, including macos-latest, so `eas build
# --local` here bypasses the EAS-hosted build quota entirely while EAS still
# supplies iOS signing credentials via the EXPO_TOKEN secret.
#
# SECURITY (public repo): logs are world-readable. Triggered manually only
# (workflow_dispatch) so fork PRs never run with the secret. EXPO_TOKEN is
# referenced only through `env:` (never interpolated into a run: string) and is
# auto-masked by Actions. Never echo it.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        default: development
        options:
          - development
          - preview
      publish_release:
        description: "Publish .ipa + itms-services manifest to a GitHub Release for OTA install"
        type: boolean
        default: true

concurrency:
  group: ios-build
  cancel-in-progress: false

permissions:
  contents: write # required for `gh release create` when publish_release is true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile-app

    steps:
      - name: Checkout (full repo — build:data reads sibling best-ball-manager/)
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compact bundled CSV data (required before every EAS build)
        run: npm run build:data

      - name: EAS local iOS build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Archive the freshly-checked-out working tree directly instead of via
          # git. The repo has a Docs/ vs docs/ case collision (TASK-209) that trips
          # EAS's git-based archival on the case-insensitive macOS runner
          # ("inconsistent filename casing"). The CI checkout is clean, so a
          # non-VCS archive is equivalent to the committed tree. Remove once
          # TASK-209 normalizes the casing.
          EAS_NO_VCS: "1"
        run: |
          npx eas-cli@latest build \
            --platform ios \
            --profile "${{ inputs.profile }}" \
            --local \
            --non-interactive \
            --output "${{ github.workspace }}/build.ipa"

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bbe-ios-${{ inputs.profile }}-${{ github.run_number }}
          path: build.ipa
          if-no-files-found: warn
          retention-days: 14

      # --- OTA install path (TASK-334): host .ipa + itms-services manifest on a
      # GitHub Release so the developer can install from Windows by opening a
      # link in Safari on the iPhone. Requires the device UDID to be in the
      # provisioning profile (already registered for the current device). ---
      - name: Publish OTA Release (.ipa + manifest.plist)
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          TAG="ios-build-${{ github.run_number }}"
          REPO="${{ github.repository }}"
          IPA_URL="https://github.com/${REPO}/releases/download/${TAG}/build.ipa"

          # itms-services OTA manifest pointing at the .ipa asset in this release.
          cat > manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key><string>software-package</string>
                    <key>url</key><string>${IPA_URL}</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key><string>com.bestballexposures.app</string>
                  <key>bundle-version</key><string>1.0.0</string>
                  <key>kind</key><string>software</string>
                  <key>title</key><string>Best Ball Exposures</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          gh release create "$TAG" \
            build.ipa manifest.plist \
            --repo "$REPO" \
            --title "iOS ${{ inputs.profile }} build #${{ github.run_number }}" \
            --notes "Automated EAS local iOS build (TASK-334). OTA install link below."

          MANIFEST_URL="https://github.com/${REPO}/releases/download/${TAG}/manifest.plist"
          INSTALL_URL="itms-services://?action=download-manifest&url=${MANIFEST_URL}"

          {
            echo "## OTA install"
            echo ""
            echo "Open this link in **Safari on the iPhone** (whose UDID is in the provisioning profile):"
            echo ""
            echo "\`${INSTALL_URL}\`"
            echo ""
            echo "If Safari blocks the custom scheme, open the plain install page in the runbook that wraps this link in an \`<a href>\`."
          } >> "$GITHUB_STEP_SUMMARY"
