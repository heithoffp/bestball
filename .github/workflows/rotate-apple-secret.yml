name: Rotate Apple Sign-In client secret

# Apple caps the Sign in with Apple OAuth client secret at 6 months of
# validity (TASK-347). This workflow re-mints a ~5.5-month secret monthly and
# PATCHes it into the Supabase Auth config via the Management API, so the
# ADR-029 web OAuth flow (web app + Chrome extension) never lapses. Monthly is
# deliberately redundant: up to four consecutive missed runs still leave a
# valid secret. Native mobile signInWithIdToken does not use this secret.
#
# GOTCHA: on public repos GitHub disables scheduled workflows after 60 days
# without repository activity (workflow runs alone don't count). GitHub emails
# a warning first; re-enable is one click in the Actions tab. The 5.5-month
# secret runway leaves months of slack — see
# docs/Apple_Secret_Rotation_Runbook.md for triage. Cron fires only from the
# default branch.
#
# SECURITY (public repo): logs are world-readable. No pull_request trigger, so
# fork PRs never run with the secrets. Secrets are referenced only through
# `env:` (never interpolated into a run: string) and are auto-masked by
# Actions; the script is written to never print secret material on any code
# path. Never echo them.

on:
  schedule:
    - cron: "17 6 3 * *" # monthly, 3rd at 06:17 UTC (off-peak minute)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Mint + preflight only; skip the Supabase PATCH"
        type: boolean
        default: false

concurrency:
  group: rotate-apple-secret
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # No npm install: the script is zero-dependency in CI (dotenv is loaded
      # via a guarded dynamic import that no-ops when absent).
      - name: Rotate secret
        env:
          APPLE_SIGNIN_KEY_P8: ${{ secrets.APPLE_SIGNIN_KEY_P8 }}
          APPLE_SIGNIN_KEY_ID: ${{ secrets.APPLE_SIGNIN_KEY_ID }}
          APPLE_SERVICES_ID: ${{ secrets.APPLE_SERVICES_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/rotate-apple-secret.mjs ${{ inputs.dry_run == true && '--dry-run' || '' }}
