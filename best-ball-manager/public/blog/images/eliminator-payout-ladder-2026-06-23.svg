<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-monospace, 'Cascadia Mono', Consolas, Menlo, monospace">
  <rect width="720" height="360" fill="#0b1626"/>

  <text x="32" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#ece7da">The money sits at the back</text>
  <text x="32" y="60" font-size="10" letter-spacing="1.5" fill="#5d6b82">UNDERDOG ELIMINATOR PAYOUTS · 2026</text>

  <!-- Gridlines (x = 200 + dollars * 0.00225) -->
  <line x1="312.5" y1="100" x2="312.5" y2="300" stroke="#1a2d50" stroke-width="1"/>
  <line x1="425" y1="100" x2="425" y2="300" stroke="#1a2d50" stroke-width="1"/>
  <line x1="537.5" y1="100" x2="537.5" y2="300" stroke="#1a2d50" stroke-width="1"/>
  <line x1="650" y1="100" x2="650" y2="300" stroke="#1a2d50" stroke-width="1"/>
  <text x="312.5" y="92" font-size="9" letter-spacing="1" fill="#5d6b82" text-anchor="middle">$50K</text>
  <text x="425" y="92" font-size="9" letter-spacing="1" fill="#5d6b82" text-anchor="middle">$100K</text>
  <text x="537.5" y="92" font-size="9" letter-spacing="1" fill="#5d6b82" text-anchor="middle">$150K</text>
  <text x="650" y="92" font-size="9" letter-spacing="1" fill="#5d6b82" text-anchor="middle">$200K</text>

  <!-- Baseline -->
  <line x1="200" y1="100" x2="200" y2="300" stroke="#243a5c" stroke-width="1"/>

  <!-- Reach Week 14 — $10,000 (the lock) -->
  <text x="24" y="134" font-size="12" fill="#ece7da">Reach Week 14</text>
  <rect x="200" y="117" width="22.5" height="26" fill="#34d399"/>
  <text x="230.5" y="134" font-size="12" fill="#34d399">$10,000</text>
  <text x="300" y="134" font-size="9" letter-spacing="1.5" fill="#34d399">LOCKED — ANY SCORE</text>

  <!-- Reach Week 15 — $30,000 -->
  <text x="24" y="182" font-size="12" fill="#ece7da">Reach Week 15</text>
  <rect x="200" y="165" width="67.5" height="26" fill="#e8bf4a"/>
  <text x="275.5" y="182" font-size="12" fill="#e8bf4a">$30,000</text>

  <!-- 3rd place — $130,000 -->
  <text x="24" y="230" font-size="12" fill="#ece7da">3rd place</text>
  <rect x="200" y="213" width="292.5" height="26" fill="#e8bf4a"/>
  <text x="500.5" y="230" font-size="12" fill="#e8bf4a">$130,000</text>

  <!-- 1st place — $200,000 -->
  <text x="24" y="278" font-size="12" fill="#ece7da">1st place</text>
  <rect x="200" y="261" width="450" height="26" fill="#e8bf4a"/>
  <text x="642" y="278" font-size="12" fill="#0b1626" text-anchor="end" font-weight="bold">$200,000</text>

  <text x="32" y="350" font-size="9" letter-spacing="1" fill="#5d6b82">SOURCE: BEST BALL EXPOSURES · STRUCTURE ILLUSTRATIVE — CONFIRM YOUR CONTEST</text>
</svg>
