# Supabase project configuration.
#
# This file was added for the Best Ball Arena (ADR-013 / TASK-281). The Arena
# voting functions must accept GUEST (unauthenticated) callers as part of the
# free, viral top-of-funnel — so JWT verification is disabled for them at the
# gateway. They do their own identity handling: a missing/invalid JWT is treated
# as a guest voter, and integrity is enforced by signed single-use pairing tokens
# + the arena_matches.pairing_id unique constraint (see supabase/functions/_shared/arena.ts).
#
# All other functions keep the default (verify_jwt = true).

[functions.arena-pair]
verify_jwt = false

[functions.arena-vote]
verify_jwt = false

# arena-register also handles its own identity: it reads the caller's JWT email for
# the ADR-015 private-beta allowlist and treats a missing/invalid token as "denied"
# (fails closed). verify_jwt stays false so the function — not the gateway — returns
# the 403, keeping the gate logic in one place.
[functions.arena-register]
verify_jwt = false

# live-activity-relay (EPIC-08): called by the iOS broadcast extension, which
# holds no user JWT — it authenticates with the publishable key, and the
# unguessable ActivityKit push token scopes what a caller can affect (see the
# function header for the full security model).
[functions.live-activity-relay]
verify_jwt = false

# apple-notifications (ADR-028 / TASK-344): App Store Server Notifications v2
# endpoint. Apple's servers POST here and cannot present a Supabase JWT, so the
# gateway must not gate on one — trust comes from verifying Apple's JWS signature
# chain inside the function (see _shared/appleJws.ts). sync-apple-purchase keeps
# the default verify_jwt = true (it is called by the signed-in app).
[functions.apple-notifications]
verify_jwt = false
