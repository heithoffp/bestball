<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1B2A4E"/>
      <stop offset="100%" stop-color="#0A1428"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC857"/>
      <stop offset="100%" stop-color="#F08A3E"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Background circle (Twitter crops to circle anyway, but we fill it) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle grid pattern hinting at analytics -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="2">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- Ascending sparkline/ADP trend beneath the monogram -->
  <polyline points="200,740 320,700 420,680 520,620 640,580 740,520 840,440"
            fill="none" stroke="url(#accent)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <!-- End dot on sparkline -->
  <circle cx="840" cy="440" r="18" fill="url(#accent)"/>

  <!-- BBE monogram -->
  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="900"
     text-anchor="middle" fill="#FFFFFF">
    <text x="512" y="470" font-size="360" letter-spacing="-18">BBE</text>
  </g>

  <!-- Thin ring for definition on light backgrounds -->
  <circle cx="512" cy="512" r="504" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>
</svg>
