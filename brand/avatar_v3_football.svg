<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </radialGradient>
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A05A2C"/>
      <stop offset="100%" stop-color="#5E2E14"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFC857" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFC857"/>
      <stop offset="100%" stop-color="#FFC857" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg3)"/>

  <!-- Football silhouette (ellipse with laces) -->
  <g transform="translate(512 520) rotate(-20)">
    <ellipse cx="0" cy="0" rx="340" ry="200" fill="url(#ball)" stroke="#FFC857" stroke-width="6"/>
    <!-- Laces -->
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#FFF5DC" stroke-width="10" stroke-linecap="round"/>
    <line x1="-40" y1="-22" x2="-40" y2="22" stroke="#FFF5DC" stroke-width="8" stroke-linecap="round"/>
    <line x1="-10" y1="-22" x2="-10" y2="22" stroke="#FFF5DC" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="-22" x2="20" y2="22" stroke="#FFF5DC" stroke-width="8" stroke-linecap="round"/>
    <line x1="50" y1="-22" x2="50" y2="22" stroke="#FFF5DC" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Chart overlay: ascending line crossing the football -->
  <polyline points="120,780 280,720 420,640 560,520 720,380 900,260"
            fill="none" stroke="url(#line)" stroke-width="18"
            stroke-linecap="round" opacity="0.85"/>

  <!-- BBE wordmark -->
  <g font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="900"
     text-anchor="middle" fill="#FFFFFF">
    <text x="512" y="900" font-size="140" letter-spacing="-4">BBE</text>
  </g>

  <circle cx="512" cy="512" r="504" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>
</svg>
